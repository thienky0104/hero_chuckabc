function buildCard(idx, cityKey) {
  const i = idx % 12;
  const vipMap = {
    sg: [0,1,2,4,6,10],
    hn: [0,1,2,5,8],
    dn: [0,1,2,4,7,9],
    nt: [0,1,2,3,6,10],
  };
  const isVip = (vipMap[cityKey] || []).includes(i);
  const rankBadge = i === 0
    ? `<div class="badge-rank rank-1"><span class="rank-num">1</span></div>`
    : i === 1
    ? `<div class="badge-rank rank-2"><span class="rank-num">2</span></div>`
    : i === 2
    ? `<div class="badge-rank rank-3"><span class="rank-num">3</span></div>`
    : '';
  return `
    <div class="model-card" onclick="openProfile('${cityKey}', ${i})">
      <div class="card-img-wrap">
        ${(()=>{
          const imgMap = { 'sg-0': '/images/mai-linh.jpg' };
          const key = cityKey+'-'+i;
          return imgMap[key]
            ? `<img src="${imgMap[key]}" alt="${cityData[cityKey].names[i]}" style="width:100%;height:100%;object-fit:cover;filter:brightness(.92) contrast(1.05);">`
            : `<div class="card-img-placeholder"><span>${String(i+1).padStart(2,'0')}</span></div>`;
        })()}
        <div class="card-gradient"></div>
        ${rankBadge}
        ${isVip ? '<div class="badge-vip">VIP</div>' : ''}
      </div>
      <div class="card-info">
        <div class="card-name">${cityData[cityKey].names[i]}</div>
        <div class="card-age-area">${cityData[cityKey].ages[i]} tuổi · ${cityData[cityKey].districts[i]}</div>
        <div class="card-stats">
          <div class="card-stat-row">
            <span class="cs-label">Giá</span>
            <span class="cs-val gold">${cityData[cityKey].prices[i]}tr</span>
          </div>
          <div class="card-stat-row">
            <span class="cs-label">Cao / Nặng</span>
            <span class="cs-val">${cityData[cityKey].heights[i]}cm / ${cityData[cityKey].weights[i]}kg</span>
          </div>
          <div class="card-stat-row">
            <span class="cs-label">Lượt xem</span>
            <span class="cs-val">${cityData[cityKey].views[i]}</span>
          </div>
        </div>
        <div class="card-tags">
          ${cityData[cityKey].services[i].map(s => `<span class="card-tag">${s}</span>`).join('')}
        </div>
        <button class="card-btn">Xem chi tiết</button>
      </div>
    </div>
  `;
}

// ── INIT CAROUSELS ──────────────────────────────────
const cities = ['sg','hn','dn','nt'];
const offsets = {sg:0, hn:0, dn:0, nt:0};

cities.forEach(c => {
  const track = document.getElementById(`track-${c}`);
  for (let i = 0; i < 12; i++) track.innerHTML += buildCard(i, c);
  initDrag(c);
});

function getCardW(city) {
  const track = document.getElementById(`track-${city}`);
  const card = track.querySelector('.model-card');
  if (!card) return 214;
  return card.offsetWidth + 19.2;
}

function getMaxOffset(city) {
  const track = document.getElementById(`track-${city}`);
  const cards = track.querySelectorAll('.model-card');
  const cardW = getCardW(city);
  const outerW = track.parentElement.offsetWidth - 128;
  return Math.max(0, cards.length * cardW - outerW);
}

function slide(city, dir) {
  const track = document.getElementById(`track-${city}`);
  const cardW = getCardW(city);
  const max = getMaxOffset(city);
  const target = Math.max(0, Math.min(offsets[city] + dir * cardW * 3, max));
  offsets[city] = target;
  track.style.transition = 'transform .5s cubic-bezier(.25,.46,.45,.94)';
  track.style.transform = `translateX(-${target}px)`;
}

function initDrag(city) {
  const track = document.getElementById(`track-${city}`);
  const outer = track.parentElement;

  // State
  let pointerDown = false;
  let startX = 0;
  let startOffset = 0;
  let lastX = 0;
  let lastTime = 0;
  let velocity = 0;
  let hasMoved = false;
  let animId = null;

  // Kill any running animation
  function stop() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
  }

  // Instantly position (no transition)
  function moveTo(x) {
    track.style.transition = 'none';
    track.style.transform = `translateX(${x}px)`;
  }

  // Animate to target with momentum decay
  function glide(from, vel) {
    stop();
    const max = getMaxOffset(city);
    const friction = 0.94;
    let pos = from;
    let v = vel;

    function frame() {
      v *= friction;
      pos += v;

      // hard clamp
      if (pos > 0) { pos = 0; v = 0; }
      if (pos < -max) { pos = -max; v = 0; }

      moveTo(pos);
      offsets[city] = -pos;

      if (Math.abs(v) > 0.5) {
        animId = requestAnimationFrame(frame);
      } else {
        // snap to nearest card
        const cardW = getCardW(city);
        const snapped = -Math.round(-pos / cardW) * cardW;
        const clamped = Math.max(-max, Math.min(0, snapped));
        offsets[city] = -clamped;
        track.style.transition = 'transform .3s cubic-bezier(.25,.46,.45,.94)';
        track.style.transform = `translateX(${clamped}px)`;
      }
    }
    animId = requestAnimationFrame(frame);
  }

  function getClientX(e) {
    return e.touches ? e.touches[0].clientX : e.clientX;
  }

  function onDown(e) {
    stop();
    pointerDown = true;
    hasMoved = false;
    velocity = 0;
    startX = getClientX(e);
    lastX = startX;
    lastTime = performance.now();
    // read current rendered position
    const mat = new DOMMatrix(getComputedStyle(track).transform);
    startOffset = mat.m41; // current translateX
    moveTo(startOffset);
    outer.style.cursor = 'grabbing';
  }

  function onMove(e) {
    if (!pointerDown) return;
    const x = getClientX(e);
    const now = performance.now();
    const dt = now - lastTime || 1;
    const dx = x - lastX;

    if (Math.abs(x - startX) > 3) hasMoved = true;

    // velocity as px/frame (assume 60fps → *16/dt normalise)
    velocity = dx * (16 / dt);

    lastX = x;
    lastTime = now;

    const raw = startOffset + (x - startX);
    const max = getMaxOffset(city);

    // rubber-band past edges
    let pos = raw;
    if (raw > 0)    pos = raw * 0.2;
    if (raw < -max) pos = -max + (raw + max) * 0.2;

    moveTo(pos);
    if (e.cancelable && hasMoved) e.preventDefault();
  }

  function onUp() {
    if (!pointerDown) return;
    pointerDown = false;
    outer.style.cursor = 'grab';
    if (!hasMoved) return;

    // block card clicks after drag
    track.querySelectorAll('.model-card').forEach(card => {
      const blocker = ev => { ev.preventDefault(); ev.stopPropagation(); card.removeEventListener('click', blocker, true); };
      card.addEventListener('click', blocker, true);
    });

    const mat = new DOMMatrix(getComputedStyle(track).transform);
    const curPos = mat.m41;
    glide(curPos, velocity);
  }

  // Pointer Events API — unified mouse + touch, no jank
  outer.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove, { passive: false });
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);

  outer.style.cursor = 'grab';
  outer.style.userSelect = 'none';
  outer.style.touchAction = 'pan-y'; // allow vertical scroll, intercept horizontal
}

// ── PROFILE ROUTING ──────────────────────────────────
const profileRoutes = {
  'sg-0': 'mai-linh.html',
  // Add more as you build them:

};

function openProfile(city, idx) {
  const key = `${city}-${idx}`;
  const url = profileRoutes[key];
  if (url) {
    window.open(url, '_blank');
  } else {
    // Profile not built yet — do nothing or show a coming soon
    alert('Hồ sơ đang được cập nhật, vui lòng quay lại sau!');
  }
}

  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60);
});

// ── CITY PILL SCROLL ──────────────────────────────
function scrollToCity(id, el) {
  document.querySelectorAll('.city-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// ── INTERSECTION OBSERVER ──────────────────────────
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
